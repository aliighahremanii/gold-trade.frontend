name: frontend-ci

on:
  pull_request:
  push:
    branches:
      - main
      - dev

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NEXT_PUBLIC_APP_ENV: staging
  NEXT_PUBLIC_API_BASE_URL: https://saba.gold
  OPENAPI_BASE_URL: https://saba.gold

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('bun.lock', 'package.json', 'next.config.ts', 'tsconfig.json', 'src/**') }}
          restore-keys: |
            ${{ runner.os }}-next-

      - name: Install
        run: bun install --frozen-lockfile

      - name: Generate API client
        run: bun run generate:api

      - name: Check generated API drift
        run: bun run check:api-drift

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Verify standalone output
        run: test -f .next/standalone/server.js

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: E2E tests
        run: bun run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ github.run_id }}
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore
